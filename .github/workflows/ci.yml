name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Verify poetry.lock is consistent with pyproject.toml
        # A stale lockfile is how a merged PR breaks everyone else's
        # install. Run this *before* `poetry install`, so the install
        # cannot silently rewrite the lockfile and mask drift.
        run: poetry check --lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check formatting (black)
        run: poetry run black --check src tests

      - name: Check import order (isort)
        run: poetry run isort --check-only src tests

      - name: Lint (flake8)
        run: poetry run flake8 src tests

      - name: Type-check (mypy, non-blocking)
        # mypy runs but is not yet gated because the repo has a large
        # backlog of pre-existing type errors. Publishing the output
        # makes drift visible and prevents new errors from being
        # silently added — once the backlog is cleared, flip this step
        # to blocking by removing ``continue-on-error``.
        continue-on-error: true
        run: poetry run mypy src

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry lock && poetry install

      - name: Test
        run: make test

  # Dependency vulnerability scan. Runs on every push / PR as a
  # belt-and-braces companion to Dependabot: pip-audit checks the
  # *currently installed* tree against the PyPA advisory database,
  # whereas Dependabot opens PRs for new releases. A vuln disclosed
  # against a version we already pin shows up here first.
  #
  # ``continue-on-error: true`` for now so new advisories don't
  # instantly block unrelated PRs — the report is still published
  # in the Actions log. Flip to blocking once we have a triage
  # process for the typical CVE-per-week cadence on async Python deps.
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pip-audit
        continue-on-error: true
        run: |
          poetry run pip install --quiet pip-audit
          poetry run pip-audit --strict --progress-spinner off
